<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giulia's Ice Cream Birdy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            min-height: -webkit-fill-available;
            background: radial-gradient(circle at 50% 98%,
                #ff5ccd 0%,
                #fba0e3 15%,
                #fba0e3 30%,
                #df73ff 50%,
                #00ffff 70%,
                #1e90ff 85%,
                #0000ff 100%
            ),
            linear-gradient(rgba(0,0,0,0.08), rgba(0,0,0,0.12) 70%, rgba(0,0,0,0.18));
            background-blend-mode: darken;
            background-size: 120% 120%;
            background-position: center center;
            background-repeat: no-repeat;
            animation: subtleSkyDrift 45s ease-in-out infinite;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            font-family: 'Chewy', cursive, sans-serif;
            color: #FF69B4;
        }

        @keyframes subtleSkyDrift {
            0%   { background-position: 50% 50%; }
            25%  { background-position: 52% 48%; }
            50%  { background-position: 55% 52%; }
            75%  { background-position: 48% 55%; }
            100% { background-position: 50% 50%; }
        }

        #menu, #game { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #game { display: none; }

        .title { font-size: 4.8rem; margin: 0 0 40px 0; background: linear-gradient(135deg, #ff6ec7 0%, #ffcc00 50%, #00ffea 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 62px rgba(255,255,255,0.9),1px 1px 0 #ff69b4,4px 4px 0 #ff1493,6px 6px 0 #ff1493,6px 6px 0 #c71585,0 16px 30px rgba(0,0,0,0.4); letter-spacing: 0.03em; text-align: center; animation: bounce 2.8s infinite ease-in-out; line-height: 1.0; }

        label { font-size: 1.9rem; margin-bottom: 16px; display: block; background: linear-gradient(135deg, #ff6ec7 0%, #ffcc00 50%, #00ffea 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 24px rgba(255,255,255,0.3),1px 1px 0 #ff69b4,2px 2px 0 #ff1493,4px 4px 0 #c71585,0 10px 20px rgba(0,0,0,0.35); font-weight: bold; letter-spacing: 0.08em; }

        @keyframes bounce { 0%,20%,50%,80%,100% { transform: translateY(32px); } 40% { transform: translateY(calc(32px - 42px)); } 60% { transform: translateY(calc(32px - 20px)); } }

        .slider-container { margin: 20px 0 50px; width: 85%; max-width: 420px; text-align: center; z-index: 20; }

        input[type="range"] { width: 100%; height: 14px; -webkit-appearance: none; background: linear-gradient(to right, #ff9ec1, #ff69b4, #ff1493); border-radius: 7px; outline: none; }

        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 34px; height: 34px; background: #ff69b4; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 5px 12px rgba(0,0,0,0.5); }
        input[type="range"]::-moz-range-thumb { width: 34px; height: 34px; background: #ff69b4; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 5px 12px rgba(0,0,0,0.5); }

        #startBirdCanvas { width: 180px; height: 180px; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 15px 35px rgba(0,0,0,0.55); transition: transform 0.18s ease; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent); z-index: 10; }
        #startBirdCanvas:hover { transform: scale(1.09); }
        #startBirdCanvas:active { transform: scale(0.94); }

        #scoreContainer {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #FF69B4;
            text-shadow: 2px 2px 6px black;
            font-weight: bold;
            font-size: 26px;
            text-align: center;
        }

        .labels {
            display: flex;
            justify-content: space-around;
            width: 200px;
            margin-bottom: 4px;
            font-size: 28px;
        }

        .values {
            display: flex;
            justify-content: space-around;
            width: 220px;
            font-size: 28px;
        }

        .values #eaten {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .values #eaten span:last-child {
            font-size: 32px;
        }

        .values span {
            transition: transform 0.2s ease;
        }

        .values span.updated {
            transform: scale(1.15);
            transition: transform 0.15s ease;
        }

        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #FF69B4; font-size: 38px; font-family: 'Chewy', cursive; display: none; z-index: 10; text-shadow: 1px 1px 6px #000,2px 2px 16px #000,4px 4px 26px #ff1493; padding-top: 40px; box-sizing: border-box; }

        #bestScore { font-size: 34px; margin: 16px 0; }

        #restartButton { margin-top: 16px; padding: 20px 40px; font-size: 33px; font-family: 'Chewy', cursive; color: yellow; background: #ff69b4; border: none; border-radius: 40px; cursor: pointer; box-shadow: 0 8px 20px rgba(255,105,180,0.5), inset 0 -4px 8px rgba(0,0,0,0.2); transition: all 0.18s ease; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); }

        #restartButton:hover { transform: scale(1.08); background: #ff1493; box-shadow: 0 12px 30px rgba(255,20,147,0.6), inset 0 -6px 12px rgba(0,0,0,0.25); }
        #restartButton:active { transform: scale(0.96); box-shadow: 0 4px 12px rgba(255,105,180,0.4), inset 0 2px 6px rgba(0,0,0,0.3); }

        #madeWith { font-size: 36px; margin-top: 30px; opacity: 0.9; color: #FF69B4; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="title">Giulia's<br>Ice Cream Birdy</div>
        <div class="slider-container">
            <label>SPEED: <span id="sensValue">75%</span></label>
            <input type="range" id="sensitivity" min="50" max="100" value="75" step="1">
        </div>
        <canvas id="startBirdCanvas" width="180" height="180"></canvas>
    </div>

    <div id="game">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="scoreContainer">
            <div class="labels">
                <span>Dodged</span>
                <span>Eaten</span>
            </div>
            <div class="values">
                <span id="dodged">🍦 0</span>
                <span id="eaten">🍦 0 🦋 0</span>
            </div>
        </div>
        <div id="gameOver">
            <div>You Got Ice Creamed</div>
            <div id="bestScore">🏆 Best: 0</div>
            <button id="restartButton">Tap to Choose Speed</button>
            <div id="madeWith">Made with Grok for Giulia</div>
        </div>
    </div>

<script>
    // SETTINGS
    const sensSlider = document.getElementById('sensitivity');
    const sensValue  = document.getElementById('sensValue');
    let sensitivity = 0.75;
    let spd = 3.3;  // default BASE_SPEED

    sensSlider.addEventListener('input', (e) => {
        sensitivity = e.target.value / 100;
        sensValue.textContent = e.target.value + '%';
    });

    // CANVASES & ELEMENTS
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startCanvas = document.getElementById('startBirdCanvas');
    const startCtx = startCanvas.getContext('2d');

    const gameOverEl    = document.getElementById('gameOver');
    const bestScoreEl   = document.getElementById('bestScore');
    const restartButton = document.getElementById('restartButton');

    let bird = { x: 60, y: 300, vy: 0, radius: 15, lastFlap: Date.now() };
    let eaten = 0;
    const maxEaten = 20;
    let butterfliesEaten = 0;
    let totalBites = 0;
    let particles = [];
    let butterflies = [];

    let obstacles = [];
    let score = 0;
    let highScore = localStorage.getItem('giuliaIceCreamHigh') || 0;
    let gameRunning = false;
    let frame = 0;

    const richPink = '#FF69B4';
    gameOverEl.style.color = richPink;
    document.querySelector('#gameOver > div').style.color = richPink;
    bestScoreEl.style.color = richPink;
    document.querySelector('#madeWith').style.color = richPink;

    restartButton.addEventListener('click', () => {
        gameOverEl.style.display = 'none';
        document.getElementById('game').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
    });
    restartButton.addEventListener('touchstart', e => {
        e.preventDefault();
        gameOverEl.style.display = 'none';
        document.getElementById('game').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
    });

    // BIRD DRAW FUNCTION
    function drawBird(c, cx, cy, vy = 0, flapTime = 500, scale = 1) {
        c.save();
        c.translate(cx, cy);
        c.scale(scale, scale);

        const tilt = Math.min(Math.max(vy * 0.08, -0.4), 0.4);
        c.rotate(tilt);

        const flapProgress = Math.min(flapTime / 250, 1);
        const wingAngle = Math.sin(flapProgress * Math.PI * 2) * 0.7 * (1 - flapProgress);

        // TUMMY
        if (eaten > 0) {
            const progress = Math.pow(eaten / maxEaten, 0.20); 
            const baseRadius = 6 + progress * 23;
            const horizStretch = 1.0 + progress * 2;
            const vertStretch = 0.65 + progress * 0.46;

            const tummyX = -76;
            const tummyY = 23;

            const wobbleAmp = progress * 0.12;
            const wobbleSpeed = 0.08 + progress * 0.06;
            const wobblePhase = frame * wobbleSpeed + bird.x * 0.01;
            const wobbleAngle = Math.sin(wobblePhase) * wobbleAmp;

            const pulse = 1 + Math.sin(wobblePhase * 1.5) * 0.03 * progress;

            const baseTummyAngle = -0.25;

            const tummyGrad = c.createRadialGradient(
                tummyX + 6, tummyY - 2, 0,
                tummyX, tummyY, baseRadius * 1.8
            );
            tummyGrad.addColorStop(0, '#FFEB99');
            tummyGrad.addColorStop(0.5, '#FFD700');
            tummyGrad.addColorStop(1, '#E8C923');

            c.save();
            c.translate(tummyX, tummyY);
            c.rotate(baseTummyAngle + wobbleAngle);
            c.scale(pulse, pulse);

            c.fillStyle = tummyGrad;
            c.beginPath();
            c.ellipse(0, 0, baseRadius * horizStretch, baseRadius * vertStretch, 0, 0, Math.PI * 2);
            c.fill();

            c.strokeStyle = '#FF8C00';
            c.lineWidth = 1.8 / scale;
            c.stroke(); 

            c.restore();
        }

        // Body
        const grad = c.createRadialGradient(0,0,0,0,0,28);
        grad.addColorStop(0,'#FFEB99'); grad.addColorStop(1,'#FFD700');
        c.fillStyle = grad;
        c.beginPath(); c.ellipse(0,0,22,16,0,0,Math.PI*2); c.fill();
        c.strokeStyle = '#FF8C00'; c.lineWidth = 2/scale; c.stroke();

        // WINGS
        c.save();
        c.translate(-34, 14);
        c.rotate(wingAngle + 0.06);

        const wingGrad = c.createRadialGradient(0,0,0,0,0,40);
        wingGrad.addColorStop(0,'#FFE4B5'); wingGrad.addColorStop(1,'#FFA500');
        c.fillStyle = wingGrad;
        c.beginPath();
        c.ellipse(0, 0, 38, 22, -0.45, 0, Math.PI*2);
        c.fill();
        c.strokeStyle = '#FF8C00'; c.lineWidth = 2.5/scale; c.stroke();

        c.fillStyle = 'rgba(255,228,181,0.7)';
        c.beginPath();
        c.ellipse(10, -5, 28, 16, -0.35, 0, Math.PI*2);
        c.fill();

        c.restore();

        // Head, beak, eye
        const headX = 8, headY = -8, headRadius = 8;
        c.fillStyle = 'white';
        c.beginPath(); c.arc(headX, headY, headRadius, 0, Math.PI * 2); c.fill();

        c.fillStyle = '#FF8C00';
        c.beginPath();
        c.moveTo(headX + headRadius + 4, headY - 4);
        c.lineTo(headX + headRadius + 22, headY);
        c.lineTo(headX + headRadius + 4, headY + 6);
        c.closePath(); c.fill();

        c.fillStyle = '#FF7F40';
        c.beginPath();
        c.moveTo(headX + headRadius + 4, headY + 0);
        c.lineTo(headX + headRadius + 22, headY);
        c.lineTo(headX + headRadius + 4, headY + 10);
        c.closePath(); c.fill();

        c.fillStyle = 'white';
        c.shadowBlur = 2 / scale; c.shadowColor = 'rgba(0,0,0,0.3)';
        c.beginPath(); c.arc(headX + 2, headY - 2, 5, 0, Math.PI * 2); c.fill();
        c.shadowBlur = 0;

        c.fillStyle = '#333';
        c.beginPath(); c.arc(headX + 3, headY - 1, 4.5, 0, Math.PI * 2); c.fill();

        c.fillStyle = 'black';
        c.beginPath(); c.arc(headX + 5, headY - 2, 1.8, 0, Math.PI * 2); c.fill();

        c.restore();
    }

    // START BIRD ANIMATION
    function animateStartBird() {
        startCtx.clearRect(0, 0, 180, 180);
        const t = Date.now();
        const bob = Math.sin(t * 0.0015) * 5;
        const flap = (t % 1200) < 600 ? (t % 600) : 500;
        drawBird(startCtx, 90, 90 + bob, 0, flap, 2.2);
        requestAnimationFrame(animateStartBird);
    }
    animateStartBird();

    // COLORS
    const iceCreamColors = ['#FF8FAB','#FFB07C','#FFF07C','#A3E4D7','#98ff98','#89CFF0','#C5A3FF','#D7BDE2','#B19CD9','#FF5C8A','#A7D8DE','#FF69B4'];
    const sprinkleColors = ['#FF0000','#FF69B4','#00FF00','#0000FF','#FFFF00','#FF4500','#9932CC','#00FFFF','#FFA500','#FF1493'];
    const butterflyColors = ['#FFD700', '#FF69B4', '#00FFFF', '#FF1493', '#FFFF00', '#00FF00', '#FFA500', '#8A2BE2'];

    function randomColor(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateSprinkles(scoopRadius) {
        const numSprinkles = 8 + Math.floor(Math.random() * 7);
        const sprinkles = [];
        const minDist = 13;

        for (let s = 0; s < numSprinkles; s++) {
            let attempts = 0;
            let placed = false;

            while (attempts < 60 && !placed) {
                const angle = Math.random() * Math.PI * 2;
                const r = scoopRadius * Math.sqrt(Math.random()) * 0.92;
                const px = r * Math.cos(angle);
                const py = r * Math.sin(angle);

                let tooClose = false;
                for (const existing of sprinkles) {
                    const dx = px - existing.x;
                    const dy = py - existing.y;
                    if (Math.hypot(dx, dy) < minDist) {
                        tooClose = true;
                        break;
                    }
                }

                if (!tooClose) {
                    sprinkles.push({
                        x: px, y: py,
                        rot: Math.random() * Math.PI * 2,
                        color: randomColor(sprinkleColors),
                        length: 6 + Math.random() * 5,
                        width: 2.2 + Math.random() * 1.3
                    });
                    placed = true;
                }
                attempts++;
            }

            if (!placed) {
                const angle = Math.random() * Math.PI * 2;
                const r = scoopRadius * Math.sqrt(Math.random()) * 0.92;
                sprinkles.push({
                    x: r * Math.cos(angle),
                    y: r * Math.sin(angle),
                    rot: Math.random() * Math.PI * 2,
                    color: randomColor(sprinkleColors),
                    length: 6 + Math.random() * 5,
                    width: 2.2 + Math.random() * 1.3
                });
            }
        }
        return sprinkles;
    }
        // PARTICLES
function createParticles(x, y, color, isSprinkle = false, intensity = 1, isButterfly = false) {
    const baseNum = isSprinkle ? 5 : 8;
    const num = (baseNum + Math.floor(Math.random() * 6)) * intensity;

    for (let i = 0; i < num; i++) {
        const speedMultiplier = 1 + (intensity - 1) * 0.8;

        // Tiny sizes ONLY for butterfly explosions 
        const particleSize = isButterfly 
            ? (isSprinkle 
                ? 1.8 + Math.random() * 1.8   // 1.8–3.6 px – tiny lines for sprinkles
                : 3.6 + Math.random() * 3.6)  // 3.6–7.2 px – small dots for main particles
            : (isSprinkle 
                ? 3 + Math.random() * 6 
                : 6 + Math.random() * 18);    // keep original chunky sizes for ice cream
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 10 * speedMultiplier,
            vy: (Math.random() - 0.5) * 8 * speedMultiplier - 4,
            size: particleSize,
            life: isButterfly ? 40 + Math.floor(Math.random() * 50) : 60 + Math.floor(Math.random() * 80),
            color: color,
            isSprinkle,
            gravity: isButterfly ? 0.08 + Math.random() * 0.04 : 0.12 + Math.random() * 0.06,
            isButterfly: isButterfly
        });
    }

    // No big chunks for butterflies
    if (intensity >= 2 && !isButterfly) {
        for (let i = 0; i < 3 + Math.floor(Math.random() * 3); i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 5 - 5,
                size: 12 + Math.random() * 18,
                life: 80 + Math.floor(Math.random() * 60),
                color: color,
                isSprinkle: false,
                gravity: 0.15
            });
        }
    }
}

    function updateParticles() {
        particles = particles.filter(p => --p.life > 0);
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += p.gravity;
            p.size *= 0.975;
        });
    }

    function drawParticles() {
        particles.forEach(p => {
            ctx.globalAlpha = p.life / 100;
            ctx.fillStyle = p.color;
            if (p.isSprinkle) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(Math.atan2(p.vy, p.vx));
                ctx.beginPath();
                ctx.moveTo(-p.size/2, 0);
                ctx.lineTo(p.size/2, 0);
                ctx.lineWidth = p.size / 2.5;
                ctx.lineCap = 'round';
                ctx.strokeStyle = p.color;
                ctx.stroke();
                ctx.restore();
            } else {
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        });
    }

    // BUTTERFLY FUNCTIONS
    function updateButterflies() {
        butterflies = butterflies.filter(b => b.life > 0);
        butterflies.forEach(b => {
            b.x -= spd * 0.8;
            b.y += Math.sin(frame * 0.05 + b.phase) * b.amplitude;
            b.life--;
        });
    }

function drawButterflies() {
    butterflies.forEach(b => {
        ctx.globalAlpha = b.life / 100;
        ctx.fillStyle = b.color;

        // Harsh, snappy flap (cycle every 20 frames)
        const cycle = (frame % 20);
        let wingAngle = 0;
        let wingScale = 1;

        if (cycle < 5) {
            wingAngle = 0.6;   // snap open
            wingScale = 1.15;
        } else if (cycle < 10) {
            wingAngle = 0.5;   // hold open
            wingScale = 1.1;
        } else if (cycle < 15) {
            wingAngle = -0.1;  // snap closed
            wingScale = 0.95;
        } else {
            wingAngle = 0;     // hold closed
            wingScale = 1;
        }

        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.scale(wingScale, wingScale);

        // Wing 1 (upper-right at 45°)
        ctx.save();
        ctx.rotate(0.785 + wingAngle);
        ctx.beginPath();
        ctx.ellipse(0, 0, 16, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // Tiny sprinkles on Wing 1 (fixed relative positions)
        ctx.strokeStyle = randomColor(sprinkleColors);
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(-8, -2); ctx.lineTo(-2, 2);
        ctx.moveTo(4, -4); ctx.lineTo(8, 0);
        ctx.moveTo(-2, 6); ctx.lineTo(2, 10);
        ctx.stroke();

        ctx.restore();

        // Wing 2 (lower-left at -45°)
        ctx.save();
        ctx.rotate(-0.785 - wingAngle);
        ctx.beginPath();
        ctx.ellipse(0, 0, 16, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // Tiny sprinkles on Wing 2 (fixed relative positions)
        ctx.strokeStyle = randomColor(sprinkleColors);
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(8, -2); ctx.lineTo(2, 2);
        ctx.moveTo(-4, -4); ctx.lineTo(-8, 0);
        ctx.moveTo(2, 6); ctx.lineTo(-2, 10);
        ctx.stroke();

        ctx.restore();

        ctx.restore();

        ctx.globalAlpha = 1;
    });
}

    // DRAW ICE CREAM STACK with bite marks (60% opacity punch)
    function drawIceCreamStack(c, x, baseY, totalHeight, isTop, colors, sprinklesPerScoop, bites = []) {
        const scoopCount = colors.length;
        const scoopRadius = 48;
        const scoopSpacing = scoopRadius * 1.1;

        let currentY = isTop 
            ? baseY - scoopCount * scoopSpacing + scoopRadius + 20
            : baseY - scoopCount * scoopSpacing + scoopRadius - 110;

        for (let i = 0; i < scoopCount; i++) {
            const color = colors[i];
            const scoopCenterX = x + 32;
            const scoopCenterY = currentY;

            c.save();

            const bite = bites.find(b => b.scoopIndex === i && b.isTop === isTop);
            if (bite) {
                c.fillStyle = color;
                c.beginPath();
                c.arc(scoopCenterX, scoopCenterY, scoopRadius, 0, Math.PI * 2);
                c.fill();

                c.globalAlpha = 0.6;
                c.globalCompositeOperation = 'destination-out';
                c.beginPath();
                c.arc(
                    scoopCenterX + Math.cos(bite.angle) * 32,
                    scoopCenterY + Math.sin(bite.angle) * 32,
                    bite.size,
                    0, Math.PI * 2
                );
                c.fill();

                c.globalCompositeOperation = 'source-over';
                c.globalAlpha = 1;

                c.fillStyle = 'rgba(255,255,255,0.65)';
                c.beginPath();
                c.arc(scoopCenterX - 14, scoopCenterY - 14, 12, 0, Math.PI * 2);
                c.fill();
            } else {
                c.fillStyle = color;
                c.beginPath();
                c.arc(scoopCenterX, scoopCenterY, scoopRadius, 0, Math.PI * 2);
                c.fill();

                c.fillStyle = 'rgba(255,255,255,0.65)';
                c.beginPath();
                c.arc(scoopCenterX - 14, scoopCenterY - 14, 12, 0, Math.PI * 2);
                c.fill();
            }

            const sprinkles = sprinklesPerScoop[i];
            for (const sp of sprinkles) {
                const sx = scoopCenterX + sp.x;
                const sy = scoopCenterY + sp.y;
                c.save();
                c.translate(sx, sy);
                c.rotate(sp.rot);
                c.strokeStyle = sp.color;
                c.lineWidth = sp.width;
                c.lineCap = 'round';
                c.beginPath();
                c.moveTo(-sp.length/2, 0);
                c.lineTo(sp.length/2, 0);
                c.stroke();
                c.restore();
            }

            c.restore();
            currentY += scoopSpacing;
        }

        // Cone
        const coneHeight = 160;
        const coneColor = '#F4A261';
        const waffleColor = '#E07A5F';
        let conePointY, coneWideY;

        if (isTop) {
            coneWideY = currentY - scoopSpacing * scoopCount - scoopRadius + 20;
            conePointY = coneWideY - coneHeight;
        } else {
            const lowestScoopBottom = currentY - scoopSpacing + scoopRadius;
            coneWideY = lowestScoopBottom - 20;
            conePointY = coneWideY + coneHeight;
        }

        c.fillStyle = coneColor;
        if (isTop) {
            c.beginPath();
            c.moveTo(x + 32, conePointY);
            c.lineTo(x - 12, coneWideY);
            c.lineTo(x + 76, coneWideY);
            c.closePath(); c.fill();
        } else {
            c.beginPath();
            c.moveTo(x - 12, coneWideY);
            c.lineTo(x + 76, coneWideY);
            c.lineTo(x + 32, conePointY);
            c.closePath(); c.fill();
        }

        c.strokeStyle = waffleColor;
        c.lineWidth = 2;
        const numLines = 7;
        const maxLineLength = 84;
        const minLineLength = 4;
        const lineSpacing = 24;
        const startOffset = isTop ? 30 : 6;

        for (let i = 0; i < numLines; i++) {
            const offset = startOffset + (i * lineSpacing);
            if (offset >= coneHeight) continue;
            const t = i / (numLines - 1);
            const length = isTop 
                ? minLineLength + (maxLineLength - minLineLength) * t
                : minLineLength + (maxLineLength - minLineLength) * (1 - t);

            c.beginPath();
            if (isTop) {
                const y = conePointY + offset;
                c.moveTo(x + 32 - length/2, y);
                c.lineTo(x + 32 + length/2, y);
            } else {
                const y = coneWideY + offset;
                c.moveTo(x + 32 - length/2, y);
                c.lineTo(x + 32 + length/2, y);
            }
            c.stroke();
        }
    }
    
    // CLOUDS
    const cloudLayers = [
        { speed: 0.3,  yBase: 40,  count: 2, baseSize: 80,  opacity: 0.30 },
        { speed: 0.7,  yBase: 100, count: 2, baseSize: 70, opacity: 0.20 },
        { speed: 1.3,  yBase: 130, count: 3, baseSize: 85, opacity: 0.30 }
    ];

    let clouds = [];

    function initClouds() {
        clouds = [];
        cloudLayers.forEach((layer, layerIdx) => {
            for (let i = 0; i < layer.count; i++) {
                const variation = (layerIdx === 0) ? 120 : 80;
                clouds.push({
                    layerIndex: layerIdx,
                    x: Math.random() * (canvas.width + 600) - 300,
                    y: layer.yBase + (Math.random() - 0.5) * variation,
                    size: layer.baseSize * (0.7 + Math.random() * 0.6),
                    speedOffset: Math.random() * 0.2 - 0.1,
                    puffVariation: Math.random() * 0.4 + 0.8
                });
            }
        });
    }

    function drawFluffyCloud(c, x, y, baseSize, opacity, variation) {
        c.globalAlpha = opacity;
        c.fillStyle = 'rgba(255, 255, 255, 0.98)';

        // Large horizontal base ellipse — very wide
        c.beginPath();
        c.ellipse(x, y, baseSize * 1.6 * variation, baseSize * 0.45 * variation, 0, 0, Math.PI * 2);
        c.fill();

        // Left puff — wide and shifted left
        c.beginPath();
        c.ellipse(
            x - baseSize * 0.8 * variation,
            y - baseSize * 0.1 * variation,
            baseSize * 1.3 * variation,
            baseSize * 0.4 * variation,
            0, 0, Math.PI * 2
        );
        c.fill();

        // Right puff — wide and shifted right
        c.beginPath();
        c.ellipse(
            x + baseSize * 1.0 * variation,
            y + baseSize * 0.1 * variation,
            baseSize * 1.2 * variation,
            baseSize * 0.4 * variation,
            0, 0, Math.PI * 2
        );
        c.fill();

        c.globalAlpha = 1;
    }

    initClouds();

    // GAME LOGIC
    function resetGame() {
        bird.y = 300; bird.vy = 0;
        bird.lastFlap = Date.now();
        eaten = 0;
        butterfliesEaten = 0;
        totalBites = 0;
        particles = [];
        butterflies = [];
        obstacles = [];
        score = 0;
        frame = 0;
        gameRunning = true;
        gameOverEl.style.display = 'none';

        document.getElementById('dodged').innerHTML = `🍦 0`;
        document.getElementById('eaten').innerHTML = `🍦 0 🦋 0`;

        initClouds();
        update();
    }

    const BASE_GRAVITY = 0.1;
    const BASE_JUMP = -4.5;
    const BASE_SPEED = 3.3;

    function getGravity() {
        const base = BASE_GRAVITY * (sensitivity <= 0.5 ? 0.3 : (sensitivity - 0.5) * 1.3 + 0.3);
        return base * (1 + (eaten / maxEaten) * 2.2);
    }

    function getJump() {
        return BASE_JUMP * (sensitivity <= 0.5 ? 0.3 : (sensitivity - 0.5) * 1.0 + 0.3);
    }

    function getSpeed() {
        return (BASE_SPEED + Math.min(score * 0.04, 1.2)) * sensitivity;
    }

    function addObstacle() {
        const gap = 480;
        const minH = 120;
        const topHeight = minH + Math.random() * (canvas.height - gap - 2*minH - 100);

        const scoopCountTop = 1 + Math.floor(Math.random() * 2);
        const scoopCountBottom = 1 + Math.floor(Math.random() * 2);
        const topColors = Array(scoopCountTop).fill(0).map(() => randomColor(iceCreamColors));
        const bottomColors = Array(scoopCountBottom).fill(0).map(() => randomColor(iceCreamColors));

        const topSprinkles = topColors.map(() => generateSprinkles(48));
        const bottomSprinkles = bottomColors.map(() => generateSprinkles(48));

        obstacles.push({
            x: canvas.width + 60,
            topHeight,
            bottomY: topHeight + gap,
            width: 80,
            passed: false,
            topColors, bottomColors,
            topSprinkles, bottomSprinkles,
            oscPhase: Math.random() * Math.PI * 2,
            oscAmp: 0.65 + Math.random() * 1.1,
            oscSpeedMult: 0.7 + Math.random() * 1.2,
            bites: []
        });

        // Butterfly spawn (lightweight)
        if (Math.random() < 0.88 && butterflies.length === 0) {
            const gapY = topHeight + (gap / 2);
            const pattern = Math.floor(Math.random() * 3);
            let startY;
            if (pattern === 0) startY = gapY + 80;  // bottom to middle
            else if (pattern === 1) startY = gapY - 80;  // top to middle
            else startY = gapY + (Math.random() - 0.5) * 120;  // middle wander

            butterflies.push({
                x: canvas.width + 100,
                y: startY,
                life: 250 + Math.random() * 150,
                phase: Math.random() * Math.PI * 2,
                amplitude: 1.2 + Math.random() * 2.5,
                color: randomColor(butterflyColors)
            });
        }
    }

    function flap() {
        if (!gameRunning) return;
        bird.vy = getJump();
        bird.lastFlap = Date.now();
    }

    function startFromMenu() {
        if (gameRunning) return;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'flex';
        resetGame();
    }

    startCanvas.addEventListener('click', startFromMenu);
    startCanvas.addEventListener('touchstart', e => { e.preventDefault(); startFromMenu(); });

    canvas.addEventListener('click', () => { if (gameRunning) flap(); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); if (gameRunning) flap(); });

    document.addEventListener('keydown', e => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (gameRunning) flap();
        }
    });
    
    function update() {
        if (!gameRunning) return;

        bird.vy += getGravity();
        bird.y += bird.vy;

        if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) return endGame();

        const spd = getSpeed();

        const baseSpawnInterval = 140;
        const sensitivityFactor = 60;
        const spawnInterval = Math.round(baseSpawnInterval - (sensitivity * sensitivityFactor));

        if (frame % spawnInterval === 0) addObstacle();

        obstacles.forEach((o, i) => {
            o.x -= spd;

            const baseAmplitude = 16 + (sensitivity - 0.5) * 40;
            const baseSpeed     = 0.012 + sensitivity * 0.006;
            const waveBias      = 70;

            const thisAmplitude = baseAmplitude * o.oscAmp;
            const thisSpeed     = baseSpeed * o.oscSpeedMult;

            const offsetY = Math.sin(frame * thisSpeed + o.oscPhase) * thisAmplitude + waveBias;

            o.currentTop    = o.topHeight + offsetY;
            o.currentBottom = o.bottomY + offsetY;

            if (o.x + o.width < -80) {
                obstacles.splice(i, 1);
                return;
            }

            if (bird.x + bird.radius > o.x && bird.x - bird.radius < o.x + o.width) {
                let gameOverHit = false;

                const checkStack = (colors, isTopStack, baseY) => {
                    let currentY = isTopStack 
                        ? baseY - colors.length * 52.8 + 48 + 20 
                        : baseY - colors.length * 52.8 + 48 - 110;

                    for (let j = 0; j < colors.length; j++) {
                        const sx = o.x + 32;
                        const sy = currentY;
                        const dist = Math.hypot(bird.x - sx, bird.y - sy);

                        if (dist < bird.radius + 48) {
                            const alreadyBitten = o.bites.some(b => b.scoopIndex === j && b.isTop === isTopStack);
                            if (alreadyBitten) { 
                                currentY += 52.8; 
                                continue; 
                            }

                            const angle = Math.atan2(bird.y - sy, bird.x - sx);
                            const size = 18 + Math.random() * 12;

                            if (dist < bird.radius + 30) {
                                eaten = Math.min(eaten + 2, maxEaten);
                                totalBites += 2;
                                o.bites.push({ scoopIndex: j, isTop: isTopStack, angle, size });
                                o.bites.push({ scoopIndex: j, isTop: isTopStack, angle: angle + 0.4, size: size * 0.8 });
                                createParticles(sx, sy, colors[j], false, 2);
                                createParticles(sx, sy, colors[j], true, 2);
                            } else {
                                eaten = Math.min(eaten + 1, maxEaten);
                                totalBites += 1;
                                o.bites.push({ scoopIndex: j, isTop: isTopStack, angle, size });
                                createParticles(sx, sy, colors[j], false, 2);
                                createParticles(sx, sy, colors[j], true, 2);
                            }
                        }
                        currentY += 52.8;
                    }
                };

                checkStack(o.topColors, true, o.currentTop);
                checkStack(o.bottomColors, false, o.currentBottom);

                const coneHeight = 160;
                let topConeLower, topConeUpper;

                if (o.topColors.length === 1) {
                    topConeLower = o.currentTop - coneHeight - 10;
                    topConeUpper = o.currentTop - coneHeight + 150;
                } else {
                    topConeLower = o.currentTop - coneHeight - 10;
                    topConeUpper = o.currentTop - coneHeight + 10;
                }

                if (
                    (bird.y + bird.radius > topConeLower && bird.y - bird.radius < topConeUpper) ||
                    (bird.y + bird.radius > o.currentBottom - 90 && bird.y - bird.radius < o.currentBottom + 80)
                ) {
                    gameOverHit = true;
                }

                if (gameOverHit) return endGame();
            }

            if (!o.passed && bird.x > o.x + o.width / 2) {
                o.passed = true;
                if (o.bites.length === 0) {
                    score++;
                }
            }
        });

        clouds.forEach(cloud => {
            const layer = cloudLayers[cloud.layerIndex];
            const cloudSpeed = (layer.speed + cloud.speedOffset) * spd * 0.4;
            cloud.x -= cloudSpeed;

            if (cloud.x < -cloud.size * 2) {
                cloud.x = canvas.width + cloud.size * 2 + Math.random() * 300;
                cloud.y = layer.yBase + (Math.random() - 0.5) * 80;
            }
        });

// BUTTERFLY COLLECTION
butterflies.forEach((b, i) => {
    const dx = bird.x - b.x;
    const dy = bird.y - b.y;
    if (Math.hypot(dx, dy) < bird.radius + 6) {
        butterfliesEaten++;
        createParticles(b.x, b.y, b.color, false, 3, true);  // ← color-matched tiny main particles
        createParticles(b.x, b.y, b.color, true, 2, true);   // ← color-matched tiny sprinkles
        butterflies.splice(i, 1);
    }
});
        
        updateButterflies();
        updateParticles();

        // Counters display with pop animation
        document.getElementById('dodged').innerHTML = `🍦 ${score}`;
        document.getElementById('eaten').innerHTML = `🍦 ${totalBites} 🦋 ${butterfliesEaten}`;

        document.getElementById('dodged').classList.add('updated');
        document.getElementById('eaten').classList.add('updated');
        setTimeout(() => {
            document.getElementById('dodged').classList.remove('updated');
            document.getElementById('eaten').classList.remove('updated');
        }, 300);

        frame++;
        render();
        requestAnimationFrame(update);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let layerIdx = 0; layerIdx < 2; layerIdx++) {
            clouds.forEach(cloud => {
                if (cloud.layerIndex === layerIdx) {
                    drawFluffyCloud(ctx, cloud.x, cloud.y, cloud.size, cloudLayers[layerIdx].opacity, cloud.puffVariation);
                }
            });
        }

        drawBird(ctx, bird.x, bird.y, bird.vy, Date.now() - bird.lastFlap);

        obstacles.forEach(o => {
            drawIceCreamStack(ctx, o.x, o.currentTop, o.topHeight, true, o.topColors, o.topSprinkles, o.bites);
            drawIceCreamStack(ctx, o.x, o.currentBottom, canvas.height - o.currentBottom, false, o.bottomColors, o.bottomSprinkles, o.bites);
        });

        clouds.forEach(cloud => {
            if (cloud.layerIndex === 2) {
                drawFluffyCloud(ctx, cloud.x, cloud.y, cloud.size, cloudLayers[2].opacity, cloud.puffVariation);
            }
        });

        drawButterflies();
        drawParticles();
    }

    function endGame() {
        gameRunning = false;
        let newHigh = false;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('giuliaIceCreamHigh', highScore);
            newHigh = true;
        }
        bestScoreEl.textContent = newHigh 
            ? `🏆 NEW BEST: ${highScore} 🏆` 
            : `🏆 Best: ${highScore}`;

        gameOverEl.style.display = 'block';
        restartButton.textContent = newHigh ? "Play Again? 🍦" : "Play Again? 🍨";
    }
</script>
