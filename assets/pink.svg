<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 165" width="120" height="165">
  <!-- Clean cone (no waffle lines, raised for 10% overlap) -->
  <path d="M40 93 L80 93 L60 155 Z" fill="#F4A261" stroke="#E07A5F" stroke-width="8"/>
  
  <!-- Single scoop: Red (game color #FF5C8A) -->
  <ellipse cx="60" cy="65" rx="38" ry="30" fill="#FF5C8A"/>
  <!-- Highlight -->
  <ellipse cx="42" cy="55" rx="12" ry="8" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Sprinkles (game sprinkle colors) -->
  <g stroke-linecap="round">
    <line x1="50" y1="50" x2="58" y2="52" stroke="#FF0000" stroke-width="2.8"/>
    <line x1="68" y1="58" x2="75" y2="55" stroke="#FF69B4" stroke-width="3.2"/>
    <line x1="55" y1="72" x2="62" y2="78" stroke="#0000FF" stroke-width="2.5"/>
    <line x1="70" y1="48" x2="78" y2="45" stroke="#FFFF00" stroke-width="3"/>
    <line x1="45" y1="60" x2="52" y2="65" stroke="#FFA500" stroke-width="2.7"/>
    <line x1="62" y1="70" x2="68" y2="68" stroke="#FF1493" stroke-width="3.1"/>
  </g>
</svg>