<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <!-- Clean cone (no waffle lines) -->
  <path d="M38 108 L82 108 L60 175 Z" fill="#F4A261" stroke="#E07A5F" stroke-width="8"/>
  
  <!-- Bottom scoop: peach (#FFB07C) -->
  <ellipse cx="60" cy="85" rx="36" ry="28" fill="#FFB07C"/>
  <!-- Top scoop: mint (#A3E4D7) -->
  <ellipse cx="60" cy="45" rx="34" ry="26" fill="#A3E4D7"/>
  
  <!-- Highlights -->
  <ellipse cx="42" cy="75" rx="11" ry="7" fill="#FFFFFF" opacity="0.5"/>
  <ellipse cx="45" cy="38" rx="10" ry="6" fill="#FFFFFF" opacity="0.45"/>
  
  <!-- Sprinkles -->
  <g stroke-linecap="round">
    <!-- Bottom scoop -->
    <line x1="48" y1="78" x2="55" y2="82" stroke="#FFFF00" stroke-width="3"/>
    <line x1="70" y1="90" x2="76" y2="88" stroke="#FF0000" stroke-width="2.7"/>
    <line x1="52" y1="95" x2="59" y2="92" stroke="#FF69B4" stroke-width="3.2"/>
    <!-- Top scoop -->
    <line x1="55" y1="38" x2="62" y2="35" stroke="#0000FF" stroke-width="2.8"/>
    <line x1="68" y1="50" x2="74" y2="48" stroke="#FFA500" stroke-width="3"/>
    <line x1="50" y1="42" x2="56" y2="45" stroke="#FF1493" stroke-width="2.9"/>
  </g>
</svg>