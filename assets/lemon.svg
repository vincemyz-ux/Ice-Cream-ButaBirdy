<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <!-- Clean cone (no waffle lines) -->
  <path d="M38 108 L82 108 L60 175 Z" fill="#F4A261" stroke="#E07A5F" stroke-width="8"/>
  
  <!-- Bottom scoop: pink (#FF8FAB) -->
  <ellipse cx="60" cy="85" rx="36" ry="28" fill="#FF8FAB"/>
  <!-- Top scoop: yellow (#FFF07C) -->
  <ellipse cx="60" cy="45" rx="34" ry="26" fill="#FFF07C"/>
  
  <!-- Highlights -->
  <ellipse cx="42" cy="75" rx="11" ry="7" fill="#FFFFFF" opacity="0.5"/>
  <ellipse cx="45" cy="38" rx="10" ry="6" fill="#FFFFFF" opacity="0.45"/>
  
  <!-- Sprinkles -->
  <g stroke-linecap="round">
    <!-- Bottom scoop -->
    <line x1="50" y1="80" x2="57" y2="78" stroke="#FF0000" stroke-width="3.1"/>
    <line x1="72" y1="88" x2="78" y2="85" stroke="#FFFF00" stroke-width="2.8"/>
    <line x1="46" y1="90" x2="53" y2="94" stroke="#FF69B4" stroke-width="3"/>
    <!-- Top scoop -->
    <line x1="58" y1="40" x2="65" y2="38" stroke="#0000FF" stroke-width="2.9"/>
    <line x1="66" y1="52" x2="72" y2="50" stroke="#FFA500" stroke-width="3.2"/>
    <line x1="52" y1="44" x2="58" y2="47" stroke="#FF1493" stroke-width="2.7"/>
  </g>
</svg>