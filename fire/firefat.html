<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Scroll Test - Realistic Flicker with Rests</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            height: 100vh;
        }
        
        .fire-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .track {
            position: absolute;
            top: 50%;
            left: 100%;
            height: 90px;                    
            animation: scrollTrack linear infinite;
            animation-duration: 6s;          
        }
        
        @keyframes scrollTrack {
            to { left: -25%; }
        }
        
        .layer {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
        }
        
        .main-fire { z-index: 1; }
        .tail      { z-index: 2; opacity: 0; }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="fire-container">
        <div class="track">
            <img src="fire.svg" class="layer main-fire" alt="main fire">
            <img src="fire1.svg" id="tail1" class="layer tail" alt="tail 1">
            <img src="fire2.svg" id="tail2" class="layer tail" alt="tail 2">
        </div>
    </div>

    <div class="controls">
        <label>Flicker Style:</label>
        <span id="status" class="value">Realistic with rests</span>
    </div>

    <script>
        const tail1 = document.getElementById('tail1');
        const tail2 = document.getElementById('tail2');
        
        let useTail1 = true;
        let timeoutId = null;

        function randomOnTime() {
            return Math.floor(140 + Math.random() * 300);   // 80–400ms "on" time
        }

        function randomRestTime() {
            return Math.floor(70 + Math.random() * 200);  // 150–320ms rest
        }

        function flickerCycle() {
            // Hide both tails
            tail1.style.opacity = '0';
            tail2.style.opacity = '0';

            // Show the next tail for a random short burst
            const onTime = randomOnTime();
            
            if (useTail1) {
                tail1.style.opacity = '1';
            } else {
                tail2.style.opacity = '1';
            }

            // After "on" time, start the rest period
            timeoutId = setTimeout(() => {
                // Turn off the tail
                tail1.style.opacity = '0';
                tail2.style.opacity = '0';

                // Wait random rest time, then start next cycle
                timeoutId = setTimeout(flickerCycle, randomRestTime());
            }, onTime);

            useTail1 = !useTail1;
        }

        // Start the realistic flickering
        flickerCycle();

        // Click anywhere on the screen to restart the pattern
        document.querySelector('.fire-container').addEventListener('click', (e) => {
            if (e.target.closest('.controls')) return;
            if (timeoutId) clearTimeout(timeoutId);
            flickerCycle();
        });
    </script>
</body>
</html>
